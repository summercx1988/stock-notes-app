# config/api-providers.yaml

providers:
  minimax:
    name: "MiniMax"
    provider: "minimax"
    enabled: true
    priority: 1
    baseUrl: "https://api.minimaxi.com/v1"
    models:
      - id: "MiniMax-M2.7-highspeed"
        name: "MiniMax M2.7 Highspeed"
        pricing:
          input: 0
          output: 0
        features:
          - chat
          - function_call
        contextWindow: 128000
      - id: "speech-01"
        name: "Speech-01"
        pricing:
          input: 0
          output: 0
        features:
          - audio_transcription
    rateLimit:
      requestsPerMinute: 60
    timeout: 30000
    envKey: "MINIMAX_API_KEY"
    
  doubao:
    name: "豆包"
    provider: "doubao"
    enabled: true
    priority: 1
    baseUrl: "https://ark.cn-beijing.volces.com/api/v3"
    models:
      - id: "doubao-pro-32k"
        name: "Doubao Pro 32K"
        pricing:
          input: 0.8    # 元/百万tokens
          output: 2     # 元/百万tokens
        features:
          - chat
          - function_call
        contextWindow: 32000
      - id: "doubao-lite"
        name: "Doubao Lite"
        pricing:
          input: 0.3
          output: 0.6
        features:
          - chat
        contextWindow: 32000
    rateLimit:
      requestsPerMinute: 60
    timeout: 30000
    envKey: "DOUBAO_API_KEY"
    
  glm:
    name: "智谱GLM"
    provider: "glm"
    enabled: true
    priority: 2
    baseUrl: "https://open.bigmodel.cn/api/paas/v4"
    models:
      - id: "glm-4-flash"
        name: "GLM-4 Flash"
        pricing:
          input: 0     # 免费
          output: 0
        features:
          - chat
        contextWindow: 128000
      - id: "glm-4"
        name: "GLM-4"
        pricing:
          input: 1
          output: 3
        features:
          - chat
          - function_call
        contextWindow: 128000
      - id: "glm-4-long"
        name: "GLM-4 Long"
        pricing:
          input: 1
          output: 1
        features:
          - chat
        contextWindow: 200000
    rateLimit:
      requestsPerMinute: 60
    timeout: 30000
    envKey: "GLM_API_KEY"
    
  deepseek:
    name: "DeepSeek"
    provider: "deepseek"
    enabled: true
    priority: 3
    baseUrl: "https://api.deepseek.com/v1"
    models:
      - id: "deepseek-chat"
        name: "DeepSeek Chat"
        pricing:
          input: 0.55   # 美元/百万tokens
          output: 2.19
        features:
          - chat
          - function_call
        contextWindow: 64000
      - id: "deepseek-reasoner"
        name: "DeepSeek Reasoner"
        pricing:
          input: 0.55
          output: 2.19
        features:
          - reasoning
    rateLimit:
      requestsPerMinute: 60
    timeout: 30000
    envKey: "DEEPSEEK_API_KEY"
    
  qwen:
    name: "通义千问"
    provider: "qwen"
    enabled: true
    priority: 4
    baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    models:
      - id: "qwen-turbo"
        name: "Qwen Turbo"
        pricing:
          input: 0.3    # 元/百万tokens
          output: 0.6
        features:
          - chat
        contextWindow: 128000
      - id: "qwen-plus"
        name: "Qwen Plus"
        pricing:
          input: 0.8
          output: 2
        features:
          - chat
          - function_call
    rateLimit:
      requestsPerMinute: 60
    timeout: 30000
    envKey: "QWEN_API_KEY"

  openai:
    name: "OpenAI"
    provider: "openai"
    enabled: false
    priority: 5
    baseUrl: "https://api.openai.com/v1"
    models:
      - id: "gpt-4o-mini"
        name: "GPT-4o Mini"
        pricing:
          input: 0.15   # 美元/百万tokens
          output: 0.6
        features:
          - chat
          - function_call
      - id: "gpt-4o"
        name: "GPT-4o"
        pricing:
          input: 2.5
          output: 10
    rateLimit:
      requestsPerMinute: 500
    timeout: 60000
    envKey: "OPENAI_API_KEY"

default:
  provider: "minimax"
  model: "MiniMax-M2.7-highspeed"
